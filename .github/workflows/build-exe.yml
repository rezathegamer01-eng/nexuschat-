name: Build NexusChat Windows .exe

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Write minimal package.json for electron only
        shell: bash
        run: |
          cat > package-electron.json << 'EOF'
          {
            "name": "nexuschat",
            "version": "1.0.0",
            "main": "electron/main.js",
            "build": {
              "appId": "com.nexuschat.app",
              "productName": "NexusChat",
              "directories": { "output": "dist-electron" },
              "files": ["electron/**/*", "public/icon.png"],
              "win": { "target": "nsis", "icon": "public/icon.png" },
              "nsis": {
                "oneClick": true,
                "createDesktopShortcut": true,
                "createStartMenuShortcut": true
              }
            }
          }
          EOF

      - name: Install electron-builder
        shell: bash
        run: npm install electron@31 electron-builder@24 --legacy-peer-deps

      - name: Create icon
        shell: bash
        run: |
          node -e "var fs=require('fs');if(!fs.existsSync('public'))fs.mkdirSync('public');fs.writeFileSync('public/icon.png',Buffer.from('iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==','base64'));console.log('icon ok');"

      - name: Build exe
        shell: bash
        run: npx electron-builder --win --x64 --config package-electron.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: NexusChat-Windows-Installer
          path: dist-electron/*.exe
          if-no-files-found: error
          retention-days: 30
